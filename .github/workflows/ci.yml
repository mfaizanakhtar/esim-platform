name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e_orders:
        description: 'Set FIROAM_E2E_ORDERS=true to place real eSIM orders during integration tests'
        required: false
        default: 'false'

jobs:
  # ── fulfillment-engine ──────────────────────────────────────────────────────

  test-fulfillment-engine:
    name: Test fulfillment-engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fulfillment-engine

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: esim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/esim_test
      ENCRYPTION_KEY: test-encryption-key-32-bytes-long!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fulfillment-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check:all

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: fulfillment-engine/coverage/lcov.info
          flags: fulfillment-engine
          name: codecov-fulfillment-engine
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: fulfillment-engine/coverage/coverage-summary.json
          json-final-path: fulfillment-engine/coverage/coverage-final.json

  build-fulfillment-engine:
    name: Build fulfillment-engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fulfillment-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fulfillment-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Production smoke test
        run: |
          npm ci --omit=dev
          NODE_ENV=production node -e "
            const { logger } = require('./dist/src/utils/logger.js');
            logger.info('production startup check ok');
            console.log('\u2705 Production logger loaded successfully');
          "

  integration-fulfillment-engine:
    name: Integration Tests (FiRoam)
    runs-on: ubuntu-latest
    needs: test-fulfillment-engine
    defaults:
      run:
        working-directory: fulfillment-engine
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: esim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/esim_test
      ENCRYPTION_KEY: test-encryption-key-32-bytes-long!
      NODE_ENV: test
      FIROAM_INTEGRATION: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fulfillment-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Check FiRoam secrets
        id: secrets_check
        env:
          FIROAM_PHONE: ${{ secrets.FIROAM_PHONE }}
          FIROAM_PASSWORD: ${{ secrets.FIROAM_PASSWORD }}
          FIROAM_SIGN_KEY: ${{ secrets.FIROAM_SIGN_KEY }}
        run: |
          if [ -z "$FIROAM_PHONE" ] || [ -z "$FIROAM_PASSWORD" ] || [ -z "$FIROAM_SIGN_KEY" ]; then
            echo "⚠️  FiRoam secrets not set — skipping integration tests."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        if: steps.secrets_check.outputs.skip != 'true'
        env:
          FIROAM_PHONE: ${{ secrets.FIROAM_PHONE }}
          FIROAM_PASSWORD: ${{ secrets.FIROAM_PASSWORD }}
          FIROAM_SIGN_KEY: ${{ secrets.FIROAM_SIGN_KEY }}
          FIROAM_E2E_ORDERS: ${{ github.event.inputs.run_e2e_orders || 'false' }}
        run: npm run test:integration

  security-fulfillment-engine:
    name: Security Audit (fulfillment-engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fulfillment-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check outdated dependencies
        run: npm outdated || true

  # ── dashboard ───────────────────────────────────────────────────────────────

  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Dashboard build successful"
