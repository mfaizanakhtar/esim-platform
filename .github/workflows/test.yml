name: Tests & Coverage

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - 'tsconfig.json'
      - '.github/**'
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: esim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/esim_test
      ENCRYPTION_KEY: test-encryption-key-32-bytes-long!
      NODE_ENV: test
      # CI=true is set automatically by GitHub Actions
      # This causes vitest.config.ts to exclude firoam.integration.test.ts
      # Integration tests require real FiRoam credentials and place real orders

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Lint code
        run: npm run lint

      - name: Type check (source)
        run: npx tsc --noEmit

      - name: Type check (tests)
        run: npm run type-check:all

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-esim-backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage thresholds
        run: |
          echo "✅ Coverage thresholds met (enforced in vitest.config.ts)"
          echo "See coverage report at: coverage/index.html"

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  integration:
    name: Integration Tests (FiRoam)
    runs-on: ubuntu-latest
    needs: test
    # Only run if the secrets are present (skips on forks/external PRs)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: esim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/esim_test
      ENCRYPTION_KEY: test-encryption-key-32-bytes-long!
      NODE_ENV: test
      FIROAM_INTEGRATION: 'true'
      FIROAM_PHONE: ${{ secrets.FIROAM_PHONE }}
      FIROAM_PASSWORD: ${{ secrets.FIROAM_PASSWORD }}
      FIROAM_SIGN_KEY: ${{ secrets.FIROAM_SIGN_KEY }}
      # FIROAM_E2E_ORDERS is intentionally NOT set here — avoids placing real orders on every PR.
      # Set it manually in the GitHub Actions UI via workflow_dispatch if needed.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Check FiRoam secrets
        id: secrets_check
        run: |
          if [ -z "$FIROAM_PHONE" ] || [ -z "$FIROAM_PASSWORD" ] || [ -z "$FIROAM_SIGN_KEY" ]; then
            echo "⚠️  FiRoam secrets not set — skipping integration tests."
            echo "    Add FIROAM_PHONE, FIROAM_PASSWORD, FIROAM_SIGN_KEY to repo secrets."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        if: steps.secrets_check.outputs.skip != 'true'
        run: npm run test:integration

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Check for build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Production smoke test (no devDependencies)
        run: |
          # Simulate the Railway/Docker production environment:
          # reinstall with production deps only, then verify the app
          # entrypoint can be required without crashing (catches issues
          # like devDep transports being referenced at startup).
          npm ci --omit=dev
          NODE_ENV=production node -e "
            const { logger } = require('./dist/src/utils/logger.js');
            logger.info('production startup check ok');
            console.log('\u2705 Production logger loaded successfully');
          "
