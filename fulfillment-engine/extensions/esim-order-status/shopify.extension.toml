api_version = "2025-07"

[[extensions]]
uid = "587c72a4-6849-c6c2-4158-af8ec1e3669be06591a1"
type = "ui_extension"
name = "eSIM Order Status"
handle = "esim-order-status"

  [[extensions.targeting]]
  module = "./src/OrderStatusBlock.tsx"
  target = "customer-account.order-status.cart-line-item.render-after"

  # Declare the metafields we need so Shopify passes them to the extension.
  # Each delivered eSIM line item gets its own metafield keyed by lineItemId.
  # We request the parent "esim" namespace; the extension filters by key at runtime.
  [[extensions.metafields]]
  namespace = "esim"
  key = "delivery_tokens"
