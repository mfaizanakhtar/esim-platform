api_version = "2025-07"

[[extensions]]
uid = "587c72a4-6849-c6c2-4158-af8ec1e3669be06591a1"
type = "ui_extension"
name = "eSIM Delivery"
handle = "esim-order-status"

  [[extensions.targeting]]
  module = "./src/OrderStatusAnnouncement.tsx"
  target = "customer-account.order-status.announcement.render"
  name = "eSIM Order Status Banner"

  [[extensions.targeting]]
  module = "./src/OrderStatusBlock.tsx"
  target = "customer-account.order-status.cart-line-item.render-after"
  name = "eSIM Order Status Line Item"

  [[extensions.targeting]]
  module = "./src/OrderActionMenuItem.tsx"
  target = "customer-account.order.action.menu-item.render"
  name = "eSIM Order Action Menu"

  [[extensions.targeting]]
  module = "./src/OrderBlock.tsx"
  target = "customer-account.order.action.render"
  name = "eSIM Order Action Panel"

  [[extensions.targeting]]
  module = "./src/ThankYouAnnouncement.tsx"
  target = "purchase.thank-you.announcement.render"
  name = "eSIM Thank You Banner"

  [[extensions.targeting]]
  module = "./src/ThankYouBlock.tsx"
  target = "purchase.thank-you.cart-line-item.render-after"
  name = "eSIM Thank You Line Item"

  [extensions.capabilities]
  network_access = true
